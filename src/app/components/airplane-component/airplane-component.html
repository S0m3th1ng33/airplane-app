@if ((airplanes$ | async); as planes)
{
<div class="mx-auto relative flex flex-col border-2 rounded border-indigo-600 w-3/4 m-12 p-2 overflow-x-auto">
  <table mat-table [dataSource]="planes" class="table-auto">
    @for(column of getProperties(planes); track column) {
    <ng-container [matColumnDef]="column">
      <th mat-header-cell *matHeaderCellDef> {{column}} </th>
      <td mat-cell *matCellDef="let airplane">
        <a [routerLink]="['/airplanes', airplane.id]">
          {{airplane[column] | tailNumber: column}}
        </a>
      </td>
    </ng-container>
    }

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let airplane">
        <button mat-icon-button [routerLink]="[`/airplanes/edit/${airplane.id}`]" aria-label="Edit button">
          <mat-icon>edit</mat-icon>
          <span class="invisible">Edit airplane</span>
        </button>
        <button mat-icon-button (click)="deleteAirplane(airplane.id)" aria-label="Edit button">
          <mat-icon>delete</mat-icon>
          <span class="invisible">Delete the airplane</span>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="[...getProperties(planes), 'actions']">
    </tr>
    <tr mat-row *matRowDef="let airplane; columns: [...getProperties(planes), 'actions'];"
      [ngClass]="{'maintenance': airplane.status === 'maintenance'}"></tr>
  </table>
</div>
}
