<table mat-table [dataSource]="airplaneService.getAirplanes()">
  @for(column of getProperties(airplaneService.getAirplanes()); track column) {
  <ng-container [matColumnDef]="column">
    <th mat-header-cell *matHeaderCellDef> {{column}} </th>
    <td mat-cell *matCellDef="let airplane"> <a [routerLink]="['/airplanes', airplane.id]">{{airplane[column] | tailNumber: column}}</a></td>
  </ng-container>
  }
  <tr mat-header-row  *matHeaderRowDef="getProperties(airplaneService.getAirplanes())"></tr>
  <tr mat-row *matRowDef="let airplane; columns: getProperties(airplaneService.getAirplanes());" [ngClass]="{'maintenance': airplane.status === 'maintenance'}"></tr>
</table>
