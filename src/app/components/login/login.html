<body>
    <form class="p-4">
        <mat-card appearance="outlined" class="w-1/2 mx-auto mt-8">
            <mat-card-content>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col space-4 gap-y-4 p-4">
                        <img src="https://cdn-icons-png.flaticon.com/512/5087/5087579.png" alt="Login picture"
                            height="100" width="100" class="inline" />
                        <h1 class="text-2xl font-bold min-w-0">Login</h1>
                        <p class="min-w-0">to continue to the Airplane Management System</p>
                    </div>

                    <div class="flex flex-col space-y-4 p-2 md:mt-8">
                        <mat-form-field appearance="outline" floatLabel="auto" class="w-full min-w-0">
                            <mat-label>Username</mat-label>
                            <input matInput placeholder="Enter your username" type="text"
                                [formField]="loginForm.email" />
                        </mat-form-field>
                        @if(loginForm.email().touched() && loginForm.email().invalid()) {
                        <mat-error class="-mt-6 pl-4 min-w-0">
                            Please enter a valid email address.
                        </mat-error>
                        }
                        <mat-form-field appearance="outline" floatLabel="auto" class="w-full min-w-0">
                            <mat-label>Password</mat-label>
                            <input matInput placeholder="Enter your password" type="password"
                                [formField]="loginForm.password" />
                        </mat-form-field>
                        @if(loginForm.password().touched() && loginForm.password().invalid()) {
                        <mat-error class="-mt-6 pl-4 min-w-0">
                            Please enter a valid password.
                        </mat-error>
                        }

                        <button matButton="elevated" type="button" (click)="signIn()">
                            Login
                        </button>
                    </div>
                </div>
            </mat-card-content>
        </mat-card>
    </form>
</body>
