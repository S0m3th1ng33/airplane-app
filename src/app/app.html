<div class="loadingContainer" cdkOverlayOrigin #origin="cdkOverlayOrigin">

    @if (authService.isLoggedIn())
    {
    <button matButton [mat-menu-trigger-for]="menu">Menu</button>
    <mat-menu #menu="matMenu">
        <button mat-menu-item [routerLink]="['/airplanes']">Airplanes</button>
        <button mat-menu-item [routerLink]="['/airplanes/new']">New Airplane</button>
        <button mat-menu-item (click)="authService.logout()">Logout</button>
    </mat-menu>
    <router-outlet />
    }
    @else
    {
    <router-outlet />
    }
    <ng-template cdkConnectedOverlay
        [cdkConnectedOverlayOrigin]="origin"
        [cdkConnectedOverlayHasBackdrop]="true"
        [cdkConnectedOverlayOpen]="ls.isLoading()"
        cdkConnectedOverlayUsePopover="global"
        class="w-full h-full"
        >
        <div class="loading-layer mx-auto">
            <mat-spinner mode="indeterminate"></mat-spinner>
        </div>
    </ng-template>

</div>
